workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.contestlive.contestLive

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build iOS release
        script: flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration

      email:
        recipients:
          - ihebmechergui333@gmail.com
